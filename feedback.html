<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — SSWL Paper Review</title>
  <link rel="icon" type="image/png" href="images/SSW_Lab_logo_gold1.png">
  <style>
    :root {
      --sun-gold: #E8A838;
      --sun-orange: #D4722A;
      --deep-space: #0B1426;
      --space-blue: #1A2744;
      --nebula-blue: #2A3F6E;
      --star-white: #F4F1EC;
      --aurora-cyan: #64B5C6;
      --corona-red: #C75B3A;
      --text-primary: #1A1A2E;
      --text-secondary: #4A4A6A;
      --text-light: #8888A8;
      --bg-warm: #FDFBF7;
      --bg-card: #FFFFFF;
      --border-subtle: #E8E4DC;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg-warm);
      color: var(--text-primary);
      line-height: 1.7;
    }

    /* --- GNB --- */
    .gnb {
      background: rgba(11,20,38,0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(232,168,56,0.15);
    }

    .gnb-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 48px;
    }

    .gnb-brand {
      color: var(--sun-gold);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .gnb-links {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .gnb-links a {
      color: rgba(244,241,236,0.7);
      text-decoration: none;
      font-size: 0.82rem;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .gnb-links a:hover { color: var(--star-white); }

    .gnb-links a.active {
      color: var(--star-white);
      font-weight: 600;
    }

    .gnb-dropdown {
      position: relative;
    }

    .gnb-dropdown > span {
      color: rgba(244,241,236,0.7);
      font-size: 0.82rem;
      cursor: pointer;
      transition: color 0.2s;
      white-space: nowrap;
      user-select: none;
    }

    .gnb-dropdown > span::after {
      content: '';
      display: inline-block;
      width: 0;
      height: 0;
      border-left: 3.5px solid transparent;
      border-right: 3.5px solid transparent;
      border-top: 4px solid currentColor;
      margin-left: 5px;
      vertical-align: middle;
    }

    .gnb-dropdown:hover > span,
    .gnb-dropdown > span.active { color: var(--star-white); }
    .gnb-dropdown > span.active { font-weight: 600; }

    .gnb-dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(11,20,38,0.97);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(232,168,56,0.15);
      border-radius: 8px;
      padding: 6px 0;
      min-width: 150px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .gnb-dropdown:hover .gnb-dropdown-menu { display: block; }

    .gnb-dropdown-menu::before {
      content: '';
      position: absolute;
      top: -12px;
      left: 0;
      right: 0;
      height: 12px;
    }

    .gnb-dropdown-menu a {
      display: block;
      padding: 8px 18px;
      color: rgba(244,241,236,0.7);
      text-decoration: none;
      font-size: 0.8rem;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .gnb-dropdown-menu a:hover {
      color: var(--star-white);
      background: rgba(232,168,56,0.1);
    }

    .gnb-dropdown-menu a.active {
      color: var(--sun-gold);
      font-weight: 600;
    }

    /* --- Hero Header --- */
    .hero {
      background: linear-gradient(135deg, var(--deep-space) 0%, var(--space-blue) 40%, var(--nebula-blue) 100%);
      position: relative;
      overflow: hidden;
    }

    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.6) 0%, transparent 100%);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 24px 40px;
    }

    .hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      color: var(--star-white);
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .hero h1 .accent { color: var(--sun-gold); }

    .hero-sub {
      font-size: 0.95rem;
      color: rgba(244,241,236,0.7);
      font-weight: 300;
    }

    /* --- Main --- */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* --- Form Embed --- */
    .form-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      overflow: hidden;
    }

    .form-wrapper iframe {
      width: 100%;
      min-height: 800px;
      border: none;
      display: block;
    }

    /* --- Footer --- */
    footer {
      border-top: 1px solid var(--border-subtle);
      padding: 32px 24px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-light);
    }

    footer a {
      color: var(--sun-orange);
      text-decoration: none;
    }

    /* --- Responsive --- */
    @media (max-width: 640px) {
      .hero-content { padding: 36px 20px 28px; }
      .gnb-links { gap: 14px; }
      .gnb-links a, .gnb-dropdown > span { font-size: 0.75rem; }
      .form-wrapper iframe { min-height: 700px; }
    }
  </style>
</head>
<body>

  <!-- GNB -->
  <nav class="gnb">
    <div class="gnb-inner">
      <a href="index.html" class="gnb-brand">SSWL Paper Review</a>
      <div class="gnb-links">
        <a href="index.html">Paper Review</a>
        <div class="gnb-dropdown">
          <span>Surveillance</span>
          <div class="gnb-dropdown-menu">
            <a href="solar-wind.html">Solar Wind</a>

          </div>
        </div>
        <a href="feedback.html" class="active">Feedback</a>
        <a href="https://sunspaceweather.khu.ac.kr/" target="_blank">SSWL Lab</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero">
    <div class="stars"></div>
    <div class="hero-content">
      <h1><span class="accent">Feedback</span></h1>
      <p class="hero-sub">불편사항, 건의사항, 기능 요청 등 자유롭게 의견을 남겨주세요. 로그인 없이 작성할 수 있습니다.</p>
    </div>
  </header>

  <main class="container">
    <div class="form-wrapper">
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSeZ2x-6CZEtxijUrEUGk5yZdFNkHdSv5gwWkQtX7n54aKfvCw/viewform?embedded=true"
        loading="lazy"
      >로딩 중...</iframe>
    </div>
  </main>

  <footer>
    <p>
      Sun and Space Weather Laboratory · Kyung Hee University<br>
      <a href="https://sunspaceweather.khu.ac.kr/">sunspaceweather.khu.ac.kr</a>
      · Automated by <a href="https://assiworks.aifactory.space">Assiworks (AI Factory)</a>
    </p>
  </footer>

</body>
</html>
