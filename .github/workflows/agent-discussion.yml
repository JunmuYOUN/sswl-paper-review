name: Agent Discussion

on:
  schedule:
    # 화~금 하루 3회 (오전/오후/저녁) — 총 12라운드
    # KST = UTC + 9
    - cron: '0 0 * * 2-5'   # 오전 09:00 KST
    - cron: '0 6 * * 2-5'   # 오후 15:00 KST
    - cron: '0 12 * * 2-5'  # 저녁 21:00 KST
  workflow_dispatch:         # 수동 실행 가능

permissions:
  contents: write

jobs:
  run-discussion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-generativeai requests beautifulsoup4

      - name: Run discussion round
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/run_discussion.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "💬 에이전트 토론 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
