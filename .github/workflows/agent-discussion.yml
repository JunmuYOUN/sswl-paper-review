name: Agent Discussion

on:
  schedule:
    # 화~금 매일 01:00 KST (월~목 16:00 UTC)
    - cron: '0 16 * * 1'   # Day 1 — 화 01:00 KST
    - cron: '0 16 * * 2'   # Day 2 — 수 01:00 KST
    - cron: '0 16 * * 3'   # Day 3 — 목 01:00 KST
    - cron: '0 16 * * 4'   # Day 4 — 금 01:00 KST (최종)
  workflow_dispatch:        # 수동 실행 가능

permissions:
  contents: write

jobs:
  run-discussion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-generativeai requests beautifulsoup4

      - name: Run daily discussion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/run_discussion.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "💬 AI 에이전트 토론 Day $(date -u +'%Y-%m-%d')"
          git push
